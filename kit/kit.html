<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>One80 English — #5 kit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Poppins',Arial,sans-serif;background:#ece9e2;color:#333;}
  h1{font-size:20px;font-weight:600;padding:22px 26px 0;margin:0;}
  .sheet{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d8d4cc;margin:18px 0;}
  .c{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:170px;padding:22px;}
  .light{background:#fff;}.dark{background:#101417;}.grad{background:linear-gradient(135deg,#efeafe,#e3fbf8);}
  .t{font-size:12px;color:#9a9a92;font-weight:500;}
  .dark .t{color:#7d8a92;}
  img{display:block;}
  .lk{width:300px}.stk{width:190px}.ic{width:96px}.tile{width:104px}.fav{width:32px;image-rendering:auto}
</style></head><body>
<h1>One80 English — gradient sweep kit</h1>
<div class="sheet">
  <div class="c light"><img class="lk" src="lockup-horizontal.svg"><div class="t">horizontal lockup</div></div>
  <div class="c dark"><img class="lk" src="mono-white.svg"><div class="t">white (knockout)</div></div>
  <div class="c light"><img class="stk" src="lockup-stacked.svg"><div class="t">stacked lockup</div></div>
  <div class="c light"><img class="lk" src="mono-black.svg"><div class="t">black (1-color)</div></div>
  <div class="c grad"><img class="tile" src="app-tile.svg"><div class="t">app tile</div></div>
  <div class="c light">
    <div style="display:flex;align-items:flex-end;gap:24px">
      <img class="ic" src="icon.svg"><img class="fav" style="width:48px" src="icon.svg"><img class="fav" src="icon.svg"><img class="fav" style="width:16px" src="icon.svg">
    </div><div class="t">icon — 96 / 48 / 32 / 16 px</div>
  </div>
</div>
</body></html>
