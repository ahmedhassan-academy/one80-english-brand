<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 @page{ size:Letter; margin:0; }
 *{box-sizing:border-box}
 html,body{margin:0;padding:0}
 body{font-family:'Outfit',Arial,sans-serif;color:#13212f;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 .page{width:8.5in;height:11in;padding:0.75in 0.8in;display:flex;flex-direction:column}
 .eyebrow{font:600 10px Outfit;letter-spacing:.22em;text-transform:uppercase;color:#9aa3ad}
 .rule{height:1px;background:#e4e0d8;margin:14px 0}
 .hero{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:42px 0 30px}
 .hero svg{width:5.7in;height:auto}
 .band{background:#1F3A5F;border-radius:18px;padding:46px 0;display:flex;align-items:center;justify-content:center}
 .band svg{width:4.7in;height:auto}
 .grid{display:flex;gap:18px;margin-top:30px}
 .cell{flex:1;border:1px solid #e4e0d8;border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:1.55in}
 .cell .cap{font:600 9px Outfit;letter-spacing:.08em;text-transform:uppercase;color:#9aa3ad}
 .specs{display:flex;align-items:center;gap:30px;margin-top:30px}
 .sw{display:flex;align-items:center;gap:10px}
 .chip{width:30px;height:30px;border-radius:7px}
 .sw b{font:600 12px Outfit;color:#1F3A5F;display:block}
 .sw span{font:500 11px Outfit;color:#9aa3ad}
 .ftr{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font:500 10px Outfit;color:#9aa3ad}
 .ftr b{color:#1F3A5F;font-weight:600}
</style></head><body>
<div class="page">

  <div class="eyebrow">One80 English — Primary Logo</div>
  <div class="rule"></div>

  <!-- HERO: horizontal lockup -->
  <div class="hero">
    <svg viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#1F3A5F" stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
      <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#1F3A5F" stroke-width="6" stroke-linecap="round"/>
      <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E8552F" stroke-width="5" stroke-linecap="round"/>
      <line x1="78" y1="96" x2="124" y2="98.5" stroke="#1F3A5F" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="78" cy="96" r="6.5" fill="#E8552F"/><circle cx="78" cy="96" r="2.3" fill="#fff"/>
      <text x="8" y="116" font-size="12.5" font-weight="600" fill="#6B7886">0</text>
      <text x="118" y="116" font-size="12.5" font-weight="700" fill="#E8552F">180</text>
      <text x="190" y="92" font-size="50" font-weight="500" fill="#1F3A5F">One<tspan font-weight="700" fill="#E8552F">80</tspan></text>
      <text x="192" y="116" font-size="13" letter-spacing="7" font-weight="500" fill="#6B7886">ENGLISH</text>
    </svg>
  </div>

  <!-- REVERSED on navy -->
  <div class="band">
    <svg viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ffffff" stroke="#ffffff">
        <g stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
        <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke-width="6" stroke-linecap="round"/>
        <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E8552F" stroke="#E8552F" stroke-width="5" stroke-linecap="round"/>
        <line x1="78" y1="96" x2="124" y2="98.5" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="78" cy="96" r="6.5" fill="#E8552F" stroke="none"/>
        <text x="8" y="116" font-size="12.5" font-weight="600" stroke="none">0</text>
        <text x="118" y="116" font-size="12.5" font-weight="700" fill="#E8552F" stroke="none">180</text>
        <text x="190" y="92" font-size="50" font-weight="500" stroke="none">One<tspan font-weight="700" fill="#E8552F">80</tspan></text>
        <text x="192" y="116" font-size="13" letter-spacing="7" font-weight="500" stroke="none">ENGLISH</text>
      </g>
    </svg>
  </div>

  <!-- VARIANTS -->
  <div class="grid">
    <div class="cell">
      <svg viewBox="7 25 142 88" width="150" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#1F3A5F" stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
        <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#1F3A5F" stroke-width="6" stroke-linecap="round"/>
        <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E8552F" stroke-width="5" stroke-linecap="round"/>
        <line x1="78" y1="96" x2="124" y2="98.5" stroke="#1F3A5F" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="78" cy="96" r="6.5" fill="#E8552F"/><circle cx="78" cy="96" r="2.3" fill="#fff"/>
      </svg>
      <div class="cap">Symbol</div>
    </div>
    <div class="cell">
      <svg viewBox="0 0 180 160" width="118" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(12,-4)">
          <g stroke="#1F3A5F" stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
          <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#1F3A5F" stroke-width="6" stroke-linecap="round"/>
          <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E8552F" stroke-width="5" stroke-linecap="round"/>
          <line x1="78" y1="96" x2="124" y2="98.5" stroke="#1F3A5F" stroke-width="4.5" stroke-linecap="round"/>
          <circle cx="78" cy="96" r="6.5" fill="#E8552F"/><circle cx="78" cy="96" r="2.3" fill="#fff"/>
        </g>
        <text x="90" y="130" font-size="31" font-weight="500" fill="#1F3A5F" text-anchor="middle">One<tspan font-weight="700" fill="#E8552F">80</tspan></text>
        <text x="90" y="148" font-size="9.5" letter-spacing="5" font-weight="500" fill="#6B7886" text-anchor="middle">ENGLISH</text>
      </svg>
      <div class="cap">Stacked</div>
    </div>
    <div class="cell">
      <svg viewBox="0 0 164 164" width="92" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="160" height="160" rx="38" fill="#1F3A5F"/>
        <g transform="translate(4,22)">
          <g stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" opacity=".9"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
          <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
          <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E8552F" stroke-width="5" stroke-linecap="round"/>
          <line x1="78" y1="96" x2="124" y2="98.5" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <circle cx="78" cy="96" r="6.5" fill="#E8552F"/><circle cx="78" cy="96" r="2.3" fill="#1F3A5F"/>
        </g>
      </svg>
      <div class="cap">App icon</div>
    </div>
  </div>

  <!-- SPECS -->
  <div class="specs">
    <div class="sw"><div class="chip" style="background:#1F3A5F"></div><div><b>Navy</b><span>#1F3A5F</span></div></div>
    <div class="sw"><div class="chip" style="background:#E8552F"></div><div><b>Coral</b><span>#E8552F</span></div></div>
    <div class="sw" style="margin-left:6px"><div><b>Typeface</b><span>Outfit</span></div></div>
  </div>

  <div class="ftr"><span><b>One80 English</b> — “turn your English around, 180°.”</span><span>fuel-gauge mark · v1</span></div>

</div>
</body></html>
