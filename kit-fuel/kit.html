<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>One80 English — fuel-gauge kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 body{margin:0;font-family:Outfit,Arial;background:#efece6;color:#333}
 h1{font-size:20px;font-weight:600;padding:22px 26px 0;margin:0}
 p.note{color:#9a958c;font-size:13px;padding:6px 26px 0;margin:0;max-width:720px;line-height:1.55}
 .sheet{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d8d4cc;margin:18px 0}
 .c{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px;padding:22px}
 .light{background:#fff}.dark{background:#101417}.tile{background:#e9eef5}
 .t{font:500 12px Outfit;color:#9a958c}.dark .t{color:#7d8a92}
 img{display:block}.lk{width:330px;max-width:86%}.stk{width:172px}.tl{width:104px}
 .fav{display:flex;align-items:flex-end;gap:20px}
</style></head><body>
<h1>One80 English — fuel-gauge kit (Outfit)</h1>
<p class="note">Needle pegged at 180, coral fill ring showing the full 0→180 journey. Navy #1F3A5F + coral #E8552F.</p>
<div class="sheet">
 <div class="c light"><img class="lk" src="lockup-horizontal.svg"><div class="t">horizontal lockup</div></div>
 <div class="c dark"><img class="lk" src="mono-white.svg"><div class="t">white knockout</div></div>
 <div class="c light"><img class="stk" src="lockup-stacked.svg"><div class="t">stacked lockup</div></div>
 <div class="c light"><img class="lk" src="mono-black.svg"><div class="t">one-color (navy)</div></div>
 <div class="c tile"><img class="tl" src="app-tile.svg"><div class="t">app tile</div></div>
 <div class="c light"><div class="fav"><img style="width:96px" src="icon.svg"><img style="width:48px" src="icon-favicon.svg"><img style="width:32px" src="icon-favicon.svg"><img style="width:16px" src="icon-favicon.svg"></div><div class="t">symbol 96 · favicon 48 / 32 / 16</div></div>
</div></body></html>
