<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>One80 English — logo concepts</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Poppins',Arial,sans-serif;background:#ece9e2;color:#222;}
  h1{font-weight:600;font-size:22px;padding:24px 28px 0;margin:0;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d8d4cc;margin:20px 0;}
  .cell{display:flex;align-items:center;justify-content:center;min-height:150px;padding:18px;}
  .light{background:#ffffff;}
  .dark{background:#101417;}
  .label{grid-column:1 / -1;background:#ece9e2;font-weight:600;font-size:13px;letter-spacing:.5px;padding:14px 28px 4px;color:#555;}
  .hex{font-weight:400;color:#999;font-size:12px;}
  svg{max-width:100%;height:auto;}
</style>
</head>
<body>
<h1>One80 English — 5 logo concepts</h1>
<div class="grid">

  <div class="label">1 · Turnaround &nbsp;<span class="hex">teal #0F9E8E + green #27C079</span></div>
  <div class="cell light">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a1a" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" refX="15" refY="10" orient="auto"><path d="M1 2 L18 10 L1 18 Z" fill="#0F9E8E"/></marker><marker id="a1b" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" refX="15" refY="10" orient="auto"><path d="M1 2 L18 10 L1 18 Z" fill="#27C079"/></marker></defs>
      <path d="M82.8 37.2 A34 34 0 0 1 82.8 102.8" fill="none" stroke="#0F9E8E" stroke-width="9" stroke-linecap="round" marker-end="url(#a1a)"/>
      <path d="M65.2 102.8 A34 34 0 0 1 65.2 37.2" fill="none" stroke="#27C079" stroke-width="9" stroke-linecap="round" marker-end="url(#a1b)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#0E3B3B">One<tspan font-weight="700" fill="#0F9E8E">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#5B6B68">ENGLISH</text>
    </svg>
  </div>
  <div class="cell dark">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a1c" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" refX="15" refY="10" orient="auto"><path d="M1 2 L18 10 L1 18 Z" fill="#19C7B3"/></marker><marker id="a1d" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" refX="15" refY="10" orient="auto"><path d="M1 2 L18 10 L1 18 Z" fill="#3FD98C"/></marker></defs>
      <path d="M82.8 37.2 A34 34 0 0 1 82.8 102.8" fill="none" stroke="#19C7B3" stroke-width="9" stroke-linecap="round" marker-end="url(#a1c)"/>
      <path d="M65.2 102.8 A34 34 0 0 1 65.2 37.2" fill="none" stroke="#3FD98C" stroke-width="9" stroke-linecap="round" marker-end="url(#a1d)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#F4FBF8">One<tspan font-weight="700" fill="#19C7B3">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#9FB4AE">ENGLISH</text>
    </svg>
  </div>

  <div class="label">2 · 180 monogram tile &nbsp;<span class="hex">navy #13243F + gold #D4A437</span></div>
  <div class="cell light">
    <svg width="120" height="120" viewBox="0 0 240 240">
      <defs><marker id="a2a" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto"><path d="M1 2 L14 8 L1 14 Z" fill="#D4A437"/></marker></defs>
      <rect x="0" y="0" width="240" height="240" rx="52" fill="#13243F"/>
      <path d="M70 98 A54 32 0 0 0 170 98" fill="none" stroke="#D4A437" stroke-width="7" stroke-linecap="round" marker-end="url(#a2a)"/>
      <text x="120" y="170" font-size="92" font-weight="700" letter-spacing="-2" text-anchor="middle" fill="#D4A437">180</text>
    </svg>
  </div>
  <div class="cell dark">
    <svg width="280" height="64" viewBox="0 0 360 84">
      <text x="0" y="56" font-size="44" font-weight="600" fill="#F5F1E8">One<tspan font-weight="700" fill="#D4A437">80</tspan></text>
      <text x="2" y="78" font-size="12.5" letter-spacing="6" font-weight="500" fill="#A9A292">ENGLISH</text>
    </svg>
  </div>

  <div class="label">3 · The zero &nbsp;<span class="hex">blue #1B6FB3 + white negative space</span></div>
  <div class="cell light">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a3a" markerUnits="userSpaceOnUse" markerWidth="17" markerHeight="17" refX="13" refY="8.5" orient="auto"><path d="M1 1 L15 8.5 L1 16 Z" fill="#FFFFFF"/></marker></defs>
      <circle cx="74" cy="70" r="35" fill="#1B6FB3"/>
      <circle cx="55" cy="74" r="3.2" fill="#FFFFFF"/>
      <path d="M55 74 A19 19 0 0 0 93 74" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" marker-end="url(#a3a)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#13293D">One<tspan font-weight="700" fill="#1B6FB3">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#5A6B7D">ENGLISH</text>
    </svg>
  </div>
  <div class="cell dark">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a3b" markerUnits="userSpaceOnUse" markerWidth="17" markerHeight="17" refX="13" refY="8.5" orient="auto"><path d="M1 1 L15 8.5 L1 16 Z" fill="#101417"/></marker></defs>
      <circle cx="74" cy="70" r="35" fill="#2E9BE6"/>
      <circle cx="55" cy="74" r="3.2" fill="#101417"/>
      <path d="M55 74 A19 19 0 0 0 93 74" fill="none" stroke="#101417" stroke-width="6" stroke-linecap="round" marker-end="url(#a3b)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#EAF2FA">One<tspan font-weight="700" fill="#2E9BE6">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#8FA4B8">ENGLISH</text>
    </svg>
  </div>

  <div class="label">4 · Progress dial &nbsp;<span class="hex">coral #E8552F + navy #1F3A5F</span></div>
  <div class="cell light">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a4a" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M1 1 L12 6.5 L1 12 Z" fill="#E8552F"/></marker></defs>
      <path d="M38 92 A34 34 0 0 0 106 92" fill="none" stroke="#1F3A5F" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="92" x2="106" y2="92" stroke="#1F3A5F" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="92" x2="46" y2="92" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="42.6" y1="75" x2="48.7" y2="78.5" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="62.6" x2="58.5" y2="68.7" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="72" y1="58" x2="72" y2="66" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="89" y1="62.6" x2="85.5" y2="68.7" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="101.4" y1="75" x2="95.3" y2="78.5" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="106" y1="92" x2="98" y2="92" stroke="#1F3A5F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="72" y1="92" x2="85" y2="65" stroke="#E8552F" stroke-width="4.5" stroke-linecap="round" marker-end="url(#a4a)"/>
      <circle cx="72" cy="92" r="5" fill="#E8552F"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#1F3A5F">One<tspan font-weight="700" fill="#E8552F">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#6B564E">ENGLISH</text>
    </svg>
  </div>
  <div class="cell dark">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><marker id="a4b" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M1 1 L12 6.5 L1 12 Z" fill="#FF7A52"/></marker></defs>
      <path d="M38 92 A34 34 0 0 0 106 92" fill="none" stroke="#9FB2CC" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="92" x2="106" y2="92" stroke="#9FB2CC" stroke-width="4" stroke-linecap="round"/>
      <line x1="42.6" y1="75" x2="48.7" y2="78.5" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="62.6" x2="58.5" y2="68.7" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="72" y1="58" x2="72" y2="66" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="89" y1="62.6" x2="85.5" y2="68.7" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="101.4" y1="75" x2="95.3" y2="78.5" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="106" y1="92" x2="98" y2="92" stroke="#9FB2CC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="72" y1="92" x2="85" y2="65" stroke="#FF7A52" stroke-width="4.5" stroke-linecap="round" marker-end="url(#a4b)"/>
      <circle cx="72" cy="92" r="5" fill="#FF7A52"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#EFF3F8">One<tspan font-weight="700" fill="#FF7A52">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#A9B6C7">ENGLISH</text>
    </svg>
  </div>

  <div class="label">5 · Gradient sweep &nbsp;<span class="hex">indigo #5B2EFF → teal #16C5C0</span></div>
  <div class="cell light">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><linearGradient id="a5g" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#5B2EFF"/><stop offset="1" stop-color="#16C5C0"/></linearGradient><marker id="a5a" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto"><path d="M1 2 L16 9 L1 16 Z" fill="#16C5C0"/></marker></defs>
      <path d="M40 56 C 48 106, 92 106, 100 50" fill="none" stroke="url(#a5g)" stroke-width="11" stroke-linecap="round" marker-end="url(#a5a)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#101024">One<tspan font-weight="700" fill="url(#a5g)">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#6B6B7A">ENGLISH</text>
    </svg>
  </div>
  <div class="cell dark">
    <svg width="420" height="128" viewBox="0 0 460 140">
      <defs><linearGradient id="a5g2" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#8A6BFF"/><stop offset="1" stop-color="#2BE0D8"/></linearGradient><marker id="a5b" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto"><path d="M1 2 L16 9 L1 16 Z" fill="#2BE0D8"/></marker></defs>
      <path d="M40 56 C 48 106, 92 106, 100 50" fill="none" stroke="url(#a5g2)" stroke-width="11" stroke-linecap="round" marker-end="url(#a5b)"/>
      <text x="150" y="82" font-size="46" font-weight="500" fill="#F4F2FF">One<tspan font-weight="700" fill="url(#a5g2)">80</tspan></text>
      <text x="152" y="108" font-size="13.5" letter-spacing="6.5" font-weight="500" fill="#9D9DB0">ENGLISH</text>
    </svg>
  </div>

</div>
</body>
</html>
