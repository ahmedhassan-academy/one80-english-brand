<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 @page{ size:Letter; margin:0; }
 *{box-sizing:border-box}
 html,body{margin:0;padding:0}
 body{font-family:'Inter',Arial,sans-serif;color:#16203A;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 .page{width:8.5in;height:11in;padding:0.75in 0.8in;display:flex;flex-direction:column}
 .eyebrow{font:600 10px Inter;letter-spacing:.22em;text-transform:uppercase;color:#9AA1BC}
 .rule{height:1px;background:#E5E9F4;margin:14px 0}
 .hero{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:42px 0 30px}
 .hero svg{width:5.7in;height:auto}
 .band{background:#1A2F6E;border-radius:18px;padding:46px 0;display:flex;align-items:center;justify-content:center}
 .band svg{width:4.7in;height:auto}
 .grid{display:flex;gap:18px;margin-top:30px}
 .cell{flex:1;border:1px solid #E5E9F4;border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:1.55in}
 .cell .cap{font:600 9px Inter;letter-spacing:.08em;text-transform:uppercase;color:#9AA1BC}
 .specs{display:flex;align-items:center;gap:26px;margin-top:30px}
 .sw{display:flex;align-items:center;gap:10px}
 .chip{width:30px;height:30px;border-radius:7px}
 .sw b{font:600 12px Inter;color:#1A2F6E;display:block}
 .sw span{font:500 11px Inter;color:#9AA1BC}
 .ftr{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font:500 10px Inter;color:#9AA1BC}
 .ftr b{color:#1A2F6E;font-weight:600}
</style></head><body>
<div class="page">
  <div class="eyebrow">One80 English — Logo</div>
  <div class="rule"></div>
  <div class="hero">
    <svg viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#1A2F6E" stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
      <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#1A2F6E" stroke-width="6" stroke-linecap="round"/>
      <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E31B23" stroke-width="5" stroke-linecap="round"/>
      <line x1="78" y1="96" x2="124" y2="98.5" stroke="#1A2F6E" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="78" cy="96" r="6.5" fill="#E31B23"/><circle cx="78" cy="96" r="2.3" fill="#fff"/>
      <text x="8" y="116" font-size="12.5" font-weight="600" fill="#6B7494">0</text>
      <text x="118" y="116" font-size="12.5" font-weight="700" fill="#E31B23">180</text>
      <text x="190" y="92" font-size="50" font-weight="500" fill="#1A2F6E">One<tspan font-weight="700" fill="#E31B23">80</tspan></text>
      <text x="190" y="116" font-size="13" textLength="133" lengthAdjust="spacing" font-weight="700" fill="#1A2F6E">ENGLISH</text>
    </svg>
  </div>
  <div class="band">
    <svg viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ffffff" stroke="#ffffff">
        <g stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
        <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke-width="6" stroke-linecap="round"/>
        <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#FF5A52" stroke="#FF5A52" stroke-width="5" stroke-linecap="round"/>
        <line x1="78" y1="96" x2="124" y2="98.5" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="78" cy="96" r="6.5" fill="#FF5A52" stroke="none"/>
        <text x="8" y="116" font-size="12.5" font-weight="600" stroke="none" fill="#A9B6E0">0</text>
        <text x="118" y="116" font-size="12.5" font-weight="700" stroke="none" fill="#FF5A52">180</text>
        <text x="190" y="92" font-size="50" font-weight="500" stroke="none">One<tspan font-weight="700" fill="#FF5A52">80</tspan></text>
        <text x="190" y="116" font-size="13" textLength="133" lengthAdjust="spacing" font-weight="700" stroke="none" fill="#FFFFFF">ENGLISH</text>
      </g>
    </svg>
  </div>
  <div class="grid">
    <div class="cell">
      <svg viewBox="7 25 142 88" width="150" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#1A2F6E" stroke-width="2.6" stroke-linecap="round"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
        <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#1A2F6E" stroke-width="6" stroke-linecap="round"/>
        <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#E31B23" stroke-width="5" stroke-linecap="round"/>
        <line x1="78" y1="96" x2="124" y2="98.5" stroke="#1A2F6E" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="78" cy="96" r="6.5" fill="#E31B23"/><circle cx="78" cy="96" r="2.3" fill="#fff"/>
      </svg>
      <div class="cap">Symbol</div>
    </div>
    <div class="cell">
      <svg viewBox="0 0 164 164" width="92" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="160" height="160" rx="38" fill="#1A2F6E"/>
        <g transform="translate(4,22)">
          <g stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" opacity=".9"><line x1="24" y1="96" x2="17" y2="96"/><line x1="39.82" y1="57.82" x2="34.87" y2="52.87"/><line x1="78" y1="42" x2="78" y2="35"/><line x1="116.18" y1="57.82" x2="121.13" y2="52.87"/><line x1="132" y1="96" x2="139" y2="96"/></g>
          <path d="M24 96 A54 54 0 0 1 132 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
          <path d="M37 96 A41 41 0 0 1 119 96" fill="none" stroke="#FF5A52" stroke-width="5" stroke-linecap="round"/>
          <line x1="78" y1="96" x2="124" y2="98.5" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <circle cx="78" cy="96" r="6.5" fill="#FF5A52"/><circle cx="78" cy="96" r="2.3" fill="#1A2F6E"/>
        </g>
      </svg>
      <div class="cap">App icon</div>
    </div>
  </div>
  <div class="specs">
    <div class="sw"><div class="chip" style="background:#1A2F6E"></div><div><b>Navy</b><span>#1A2F6E</span></div></div>
    <div class="sw"><div class="chip" style="background:#E31B23"></div><div><b>Brand Red</b><span>#E31B23</span></div></div>
    <div class="sw" style="margin-left:6px"><div><b>Typeface</b><span>Inter</span></div></div>
  </div>
  <div class="ftr"><span><b>One80 English</b></span><span>fuel-gauge mark</span></div>
</div>
</body></html>
